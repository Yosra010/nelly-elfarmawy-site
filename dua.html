<h1>🤲 الدعاء</h1>

<div class="dua" onclick="add()">
  اللهم ارحم نيللي الفرماوي واغفر لها واجعل قبرها نورًا
</div>

<h2>عدد الدعوات: <span id="count">0</span></h2>

<script>
let x = 0;
function add(){
  x++;
  document.getElementById("count").innerText = x;
}
</script>
